# ─────────────────────────────────────────────────────────────────────────────
# .gitlab-ci.yml  —  Turbo Performance Report Pipeline (GitLab CI alternative)
#
# Triggers:
#   • Daily at 07:00 UTC via GitLab Scheduled Pipeline
#   • Manual pipeline run from the GitLab UI
#   • Push to main/master branch (optional — remove the rule below to disable)
#
# Required CI/CD Variables (Settings → CI/CD → Variables):
#   SMTP_USERNAME, SMTP_PASSWORD
#   RING_3A_URL, RING_3A_USER, RING_3A_PASS
#   RING_3_AWS_URL, RING_3_AWS_USER, RING_3_AWS_PASS
#   RING_3B_URL,  RING_3B_USER,  RING_3B_PASS
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - validate
  - report

default:
  image: python:3.11-slim

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  # Default: run all tenants.  Override when triggering manually.
  TENANT_ID: ""
  ENVIRONMENT_FILTER: "ALL"
  DRY_RUN: "false"

# ── Cache pip downloads between jobs ──────────────────────────────────────────
cache:
  key: pip-$CI_COMMIT_REF_SLUG
  paths:
    - .cache/pip

# ── Helper: install system + Python deps ─────────────────────────────────────
.install_deps: &install_deps |
  apt-get update -qq
  apt-get install -y --no-install-recommends \
    wget gnupg curl unzip ca-certificates \
    chromium chromium-driver \
    libgbm1 libgtk-3-0 libnss3 libxss1 libatk-bridge2.0-0 \
    libx11-xcb1 libxcb1 libxcomposite1 libxdamage1 libxrandr2 fonts-liberation
  rm -rf /var/lib/apt/lists/*
  pip install --quiet --upgrade pip
  pip install --quiet -r requirements.txt

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 – Validate
# ─────────────────────────────────────────────────────────────────────────────
validate-config:
  stage: validate
  script:
    - pip install --quiet pyyaml
    - python -c "
        import yaml
        yaml.safe_load(open('config/config.yaml'))
        yaml.safe_load(open('config/tenants.yaml'))
        print('✅ Config files are valid YAML')
      "
  rules:
    - when: always

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 – Generate & Email Reports
# ─────────────────────────────────────────────────────────────────────────────
turbo-reports:
  stage: report
  timeout: 45 minutes
  before_script:
    - *install_deps
  script:
    - |
      CMD="python main.py"
      if [ -n "$TENANT_ID" ]; then
        CMD="$CMD --tenant $TENANT_ID"
      elif [ "$ENVIRONMENT_FILTER" != "ALL" ]; then
        CMD="$CMD --environment \"$ENVIRONMENT_FILTER\""
      fi
      if [ "$DRY_RUN" = "true" ]; then
        CMD="$CMD --dry-run"
      fi
      echo "▶ Running: $CMD"
      eval $CMD
  artifacts:
    name: "turbo-reports-$CI_PIPELINE_ID"
    paths:
      - outputs/reports/
      - outputs/automation.log
    expire_in: 7 days
    when: always
  rules:
    # Scheduled pipeline (set up in GitLab → CI/CD → Schedules → daily 07:00 UTC)
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    # Manual trigger from UI or API
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'
    # Optionally: also run on push to main (comment out if not wanted)
    # - if: '$CI_COMMIT_BRANCH == "main"'
  environment:
    name: production
